<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Chargement...</title>
    <link id="dynamic-favicon" rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAAC0lEQVQI12NgAAIABQABNjN9GQAAAABJRU5ErkJggg==">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --border: #30363d;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        h1 { color: #ffffff; font-size: 24px; margin-top: 0; margin-bottom: 10px; }
        .subtitle { color: var(--accent); font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 30px; }
        .instructions { background-color: var(--bg-color); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin: 20px 0; text-align: left; }
        .instructions p { margin: 8px 0; font-size: 14px; color: var(--text-main); display: flex; align-items: center; gap: 10px; }
        .key { background-color: #21262d; border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; font-size: 12px; font-family: monospace; color: #ffffff; }
        .warning { color: var(--text-muted); font-size: 13px; border-top: 1px solid var(--border); padding-top: 20px; margin-top: 20px; }
        .warning span { color: #f0883e; font-weight: bold; }
        canvas { display: none; }
    </style>
</head>
<body>

    <div class="card">
        <div class="subtitle">Défi Frontend</div>
        <h1>Le jeu Chrome Dino en 32x32 pixels</h1>
        <div class="instructions">
            <p><span class="key">Espace</span> <span class="key">↑</span> ou <span class="key">Clic</span> Sauter</p>
            <p><span class="key">↓</span> Se baisser (ou chuter vite en l'air)</p>
        </div>
        <p class="warning">
            <span>⚠️ Astuce :</span> Ne regardez pas l'écran, regardez l'icône de l'onglet de votre navigateur en haut !
        </p>
    </div>

    <canvas id="game-canvas" width="32" height="32"></canvas>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const favicon = document.getElementById('dynamic-favicon');

        const SIZE = 32;
        const GROUND_Y = 28;
        const DINO_STANDING_H = 6;
        const DINO_DUCKING_H = 3;

        let dinoX = 4;
        let dinoY = GROUND_Y - DINO_STANDING_H;
        let velocity = 0;
        const gravity = 0.5;
        const jumpForce = -3;

        let isJumping = false;
        let isDucking = false;
        let frameCount = 0;

        let obstacles = [];
        let score = 0;
        let gameSpeed = 1.5;
        let gameOver = false;
        let highScore = 0;

        try { highScore = parseInt(localStorage.getItem('faviconDinoHighScore')) || 0; } catch(e) {}

        function resetGame() {
            dinoY = GROUND_Y - DINO_STANDING_H;
            velocity = 0;
            isJumping = false;
            isDucking = false;
            obstacles = [];
            score = 0;
            gameSpeed = 1.5;
            gameOver = false;
        }

        function jump() {
            if (gameOver) { resetGame(); return; }
            if (!isJumping) {
                isDucking = false;
                velocity = jumpForce;
                isJumping = true;
            }
        }

        const keys = {};
        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (['Space', 'ArrowUp', 'ArrowDown'].includes(e.code)) e.preventDefault();
            if (e.code === 'Space' || e.code === 'ArrowUp') jump();
            if (e.code === 'ArrowDown' && !isJumping) isDucking = true;
        });

        document.addEventListener('keyup', (e) => {
            keys[e.code] = false;
            if (e.code === 'ArrowDown') isDucking = false;
        });

        document.addEventListener('mousedown', jump);

        let lastTime = 0;
        const fps = 15;
        const frameDelay = 1000 / fps;

        function gameLoop(currentTime) {
            requestAnimationFrame(gameLoop);

            if (currentTime - lastTime < frameDelay) return;
            lastTime = currentTime;
            frameCount++;

            ctx.fillStyle = '#f7f7f7';
            ctx.fillRect(0, 0, SIZE, SIZE);

            if (!gameOver) {

                if (isJumping) {
                    if (keys['ArrowDown']) velocity += 0.5;
                    velocity += gravity;
                    dinoY += velocity;
                    if (dinoY >= GROUND_Y - DINO_STANDING_H) {
                        dinoY = GROUND_Y - DINO_STANDING_H;
                        isJumping = false;
                        velocity = 0;
                    }
                } else {
                    dinoY = isDucking ? (GROUND_Y - DINO_DUCKING_H) : (GROUND_Y - DINO_STANDING_H);
                }

                if (frameCount % 8 === 0) score++;
                if (frameCount % 150 === 0 && gameSpeed < 4) gameSpeed += 0.2;

                let scoreStr = String(score).padStart(5, '0');
                let hiStr = String(highScore).padStart(5, '0');
                document.title = scoreStr + " | HI " + hiStr;

                // ESPACEMENT CORRIGÉ : x < 6 (Le cactus doit presque sortir de l'écran pour laisser de la place)
                if (obstacles.length === 0 || (obstacles[obstacles.length-1].x < 6 && Math.random() < 0.3)) {
                    if (score > 30 && Math.random() < 0.3) {
                        let isHigh = Math.random() > 0.5;
                        let birdY = isHigh ? 22 : 25;
                        obstacles.push({ x: SIZE, y: birdY, w: 3, h: 2, type: 'bird' });
                    } else {
                        let h = Math.random() > 0.5 ? 3 : 4;
                        obstacles.push({ x: SIZE, y: GROUND_Y - h, w: 2, h: h, type: 'cactus' });
                    }
                }

                obstacles.forEach(o => o.x -= gameSpeed);
                obstacles = obstacles.filter(o => o.x > -4);

                let hitbox = {};
                if (isDucking && !isJumping) {
                    hitbox = { x: dinoX, y: dinoY, w: 5, h: 2 };
                } else {
                    hitbox = { x: dinoX + 1, y: dinoY + 1, w: 3, h: 4 };
                }

                let hit = false;
                for (let i = 0; i < obstacles.length; i++) {
                    let o = obstacles[i];
                    if (hitbox.x < o.x + o.w && hitbox.x + hitbox.w > o.x &&
                        hitbox.y < o.y + o.h && hitbox.y + hitbox.h > o.y) {
                        hit = true;
                        break;
                    }
                }

                if (hit) {
                    gameOver = true;
                    if (score > highScore) {
                        highScore = score;
                        try { localStorage.setItem('faviconDinoHighScore', highScore); } catch(e) {}
                    }
                    document.title = "💀 GAME OVER - Espace pour rejouer";
                }

                // --- DESSIN ---
                ctx.fillStyle = '#535353';
                ctx.fillRect(0, GROUND_Y, SIZE, 1);

                obstacles.forEach(o => {
                    ctx.fillStyle = '#535353';
                    if (o.type === 'cactus') {
                        ctx.fillRect(o.x, o.y, o.w, o.h);
                        if (o.h === 4) ctx.fillRect(o.x - 1, o.y + 1, 1, 2);
                    } else if (o.type === 'bird') {
                        ctx.fillRect(o.x, o.y, 3, 2);
                        let wingY = (frameCount % 6 < 3) ? -1 : 2;
                        ctx.fillRect(o.x, o.y + wingY, 1, 1);
                        ctx.fillRect(o.x + 2, o.y + wingY, 1, 1);
                    }
                });

                ctx.fillStyle = '#535353';
                if (isDucking && !isJumping) {
                    ctx.fillRect(dinoX, dinoY, 5, 2);
                } else {
                    ctx.fillRect(dinoX + 2, dinoY, 2, 2); // Tête
                    ctx.fillStyle = '#f7f7f7';
                    ctx.fillRect(dinoX + 3, dinoY, 1, 1); // Oeil
                    ctx.fillStyle = '#535353';
                    ctx.fillRect(dinoX, dinoY + 2, 4, 2); // Corps
                    ctx.fillRect(dinoX - 1, dinoY + 2, 1, 1); // Queue

                    let legOffset = (frameCount % 6 < 3) ? 0 : 1;
                    ctx.fillRect(dinoX + 1, dinoY + 4, 1, 2);
                    ctx.fillRect(dinoX + 3, dinoY + 4 + legOffset, 1, 2 - legOffset);
                }
            }

            favicon.href = canvas.toDataURL('image/png');
        }

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
